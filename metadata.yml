Title: N.gonorrhoeae antimicrobial activity
Description: Deep learning graph neural network (D-MPNN) that predicts the 
  probability of a small molecule inhibiting Neisseria gonorrhoeae growth. This 
  is the retrained Round 2 model, trained on duplicate growth-inhibition 
  screening at 50 uM against N. gonorrhoeae ATCC 49226 for 1755 clinically 
  approved drugs (Pharmakon), an internal 37K-compound library, and a first 
  round of experimentally validated hits. It was used to rescreen the Broad 800K
  library and identify compound A1, which reduced N. gonorrhoeae titers in an in
  vivo mouse vaginal infection model.
