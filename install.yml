python: "3.10"
commands:
    # torch is pinned (and installed before chemprop) on purpose: chemprop only
    # requires torch>=1.5.2, but torch>=2.6 defaults to weights_only=True and
    # refuses to unpickle these Chemprop v1.5 checkpoints. torch 1.13.1 has no
    # wheels above cp310, so 3.10 is the ceiling for this exact stack.
    # setuptools<81 is required because chemprop imports pkg_resources, which is
    # no longer bundled with Python >= 3.10.
    - ["pip", "setuptools", "80.10.2"]
    - ["pip", "numpy", "1.24.4"]
    - ["pip", "torch", "1.13.1"]
    - ["pip", "rdkit", "2023.3.2"]
    - ["pip", "descriptastorus", "2.8.0"]
    - ["pip", "chemprop", "1.5.1"]
    - ["pip", "ersilia-pack-utils", "0.1.5"]
